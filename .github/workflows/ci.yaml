name: Test Workflow
on:
  push:
    branches:
      - main
permissions:
  contents: read
  packages: write
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Print Message
        run: echo "Implementing CI at ${{ github.repository_owner }} repo"

      - name: login to ghcr.io to push image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build image
        run: "docker build -t ghcr.io/${{ vars.USERNAME }}/street-food-go:${{ github.sha }} ."
      - name: push image to ghcr.io packages
        run: "docker push ghcr.io/${{ vars.USERNAME }}/street-food-go:${{ github.sha }}"